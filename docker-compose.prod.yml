services:
  backend:
    image: ghcr.io/alexsssaalexsubay-afk/nextapi-backend:${IMAGE_TAG:-main}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      VIMAX_RUNTIME_URL: http://director-sidecar:8091
      DIRECTOR_RUNTIME_CALLBACK_URL: http://backend:8080/v1/internal/director-runtime
    command: ["/app/server"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      director-sidecar:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:8080:8080"

  worker:
    image: ghcr.io/alexsssaalexsubay-afk/nextapi-backend:${IMAGE_TAG:-main}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["/app/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  director-sidecar:
    build:
      context: .
      dockerfile: services/director_sidecar/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NEXTAPI_REPO_ROOT: /app
      DIRECTOR_RUNTIME_CALLBACK_URL: http://backend:8080/v1/internal/director-runtime
    expose:
      - "8091"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8091/health', headers={'X-Director-Sidecar-Token': os.environ.get('DIRECTOR_SIDECAR_TOKEN','')}); urllib.request.urlopen(req, timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nextapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nextapi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextapi"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - "trap exit TERM; while :; do certbot renew; sleep 12h; done;"

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  certbot-www:
