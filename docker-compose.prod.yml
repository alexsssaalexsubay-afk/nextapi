services:
  backend:
    image: ghcr.io/alexsssaalexsubay-afk/nextapi-backend:${IMAGE_TAG:-main}
    restart: unless-stopped
    env_file: .env
    command: ["/app/server"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:8080:8080"

  worker:
    image: ghcr.io/alexsssaalexsubay-afk/nextapi-backend:${IMAGE_TAG:-main}
    restart: unless-stopped
    env_file: .env
    command: ["/app/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nextapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nextapi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextapi"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - "trap exit TERM; while :; do certbot renew; sleep 12h; done;"

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  certbot-www:
