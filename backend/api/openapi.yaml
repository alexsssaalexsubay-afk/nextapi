openapi: 3.1.0
info:
  title: NextAPI Gateway
  version: 1.0.0
  summary: Unified video generation API — one endpoint and API key for all models.
  description: |
    NextAPI exposes a single REST surface (`https://api.nextapi.top/v1`) for
    text-to-video, image-to-video, and related workflows. Customers use one
    **business API key** (`sk_live_*` / `sk_test_*`) and public **model IDs**
    such as `seedance-2.0-pro` and `seedance-2.0-fast`.
    Routing, capacity, and provider details are handled inside the gateway.

    Conventions:
      * Bearer auth. Business key (sk_live_* / sk_test_*) for /videos, /models,
        /auth/me, /billing/settings, /me/*, and /webhooks (customer webhook CRUD);
        admin key (ak_live_* / ak_test_*) for /keys, /credits, /billing/ledger,
        /billing/usage, /billing/recharge, /billing/checkout, /spend_controls,
        /usage, and export endpoints.
      * Internal operator panel uses short-lived X-Op-Session tokens for browser
        admin calls; X-Admin-Token is reserved for scripts and emergency ops.
      * Idempotency-Key header on POSTs. 24h de-dup window.
      * All timestamps are RFC 3339 UTC unless stated otherwise.
      * Cursor pagination on list endpoints.
      * Outbound webhook signatures use HMAC-SHA256. Headers sent with every event:
          - X-NextAPI-Signature: t=<unix>,sha256=<hex>
          - X-NextAPI-Timestamp: <unix epoch seconds>
          - X-NextAPI-Event: <event type, e.g. video.succeeded>
  contact:
    name: NextAPI Platform
    url: https://docs.nextapi.top
  license:
    name: Proprietary
    url: https://nextapi.top/legal/terms

servers:
  - url: https://api.nextapi.top/v1
    description: Production. For local development use http://localhost:8080/v1.

security:
  - bearerBusiness: []

tags:
  - name: marketing
    description: Public marketing site configuration (read-only).
  - name: videos
  - name: models
  - name: credits
  - name: billing
  - name: usage
  - name: keys
  - name: assets
  - name: webhooks
  - name: spend_controls
  - name: moderation
  - name: throughput
  - name: auth
  - name: director
    description: NextAPI Director planning and run recovery endpoints.
  - name: health
  - name: bridge
    description: Legacy dashboard bootstrap endpoints retained during migration.
  - name: sales
  - name: internal
    description: Operator panel endpoints secured by X-Op-Session or script-only X-Admin-Token. Not for external use.

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /public/marketing/slots:
    get:
      tags: [marketing]
      summary: List homepage media slots for nextapi.top
      description: |
        Returns resolved `https://` URLs for operator-configured marketing slots
        only. R2-backed slots are presigned **only** when the stored object key is
        under the `marketing/site-slots/` prefix (same prefix used by the admin
        upload API). This avoids exposing customer job outputs if a wrong key is
        ever stored in `marketing_site_slots`. External `https://` URLs are
        passed through unchanged — operators must not point them at private
        customer media. Intended for the public marketing site (nextapi.top).
      operationId: listPublicMarketingSlots
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketingSlotsPublicResponse' }

  /auth/login:
    post:
      tags: [auth]
      summary: Sign in with a first-party NextAPI account
      operationId: accountLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, example: customer@example.com }
                password: { type: string, format: password, minLength: 8 }
      responses:
        '200':
          description: Signed in. Dashboard stores `session_token` and uses `dashboard_key.secret` for customer API calls.
          content:
            application/json:
              schema:
                type: object
                required: [user, org, session_token, dashboard_key, expires_at]
                properties:
                  user:
                    type: object
                    properties:
                      id: { type: string }
                      email: { type: string, format: email }
                      phone_e164: { type: string, nullable: true }
                  org:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                  session_token: { type: string, description: Send as `X-NextAPI-Session` for account-session endpoints. }
                  expires_at: { type: string, format: date-time }
                  balance: { type: integer, format: int64 }
                  dashboard_key:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      secret: { type: string, description: Short-lived dashboard API key; not displayed again. }
                      prefix: { type: string }
                      name: { type: string, example: dashboard-session }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/session:
    get:
      tags: [auth]
      summary: Inspect or refresh the current account session
      operationId: accountSession
      security: []
      parameters:
        - name: X-NextAPI-Session
          in: header
          required: true
          schema: { type: string }
        - name: mint_key
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: When true, returns a freshly minted dashboard API key and revokes the previous dashboard-session key.
      responses:
        '200':
          description: Current account session.
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current account session
      operationId: accountLogout
      security: []
      parameters:
        - name: X-NextAPI-Session
          in: header
          required: false
          schema: { type: string }
      responses:
        '204': { description: Logged out. }

  /auth/signup:
    post:
      tags: [auth]
      summary: Self-service signup placeholder
      operationId: accountSignup
      security: []
      description: Disabled unless `AUTH_SIGNUP_ENABLED=true`; early production uses operator-created accounts.
      responses:
        '403': { description: Invite-only signup is disabled. }

  /auth/otp/send:
    post:
      tags: [auth]
      summary: Future phone/email OTP entry point
      operationId: accountOtpSend
      security: []
      description: Reserved for phone/email OTP login. Current deployment uses assigned email/password accounts.
      responses:
        '501': { description: OTP provider is not configured. }

  /models:
    get:
      tags: [models]
      summary: List models
      operationId: listModels
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelPage' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /models/{model_id}:
    get:
      tags: [models]
      summary: Get model
      operationId: getModel
      parameters:
        - name: model_id
          in: path
          required: true
          schema: { type: string, example: seedance-2.0-pro }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '404': { $ref: '#/components/responses/NotFound' }

  /director/runs:
    get:
      tags: [director]
      summary: List Director runs
      operationId: listDirectorRuns
      description: >-
        Lists recent org-scoped Director run envelopes with step counts and
        aggregate metering totals plus the newest recovery checkpoint. Results
        are ordered by updated_at desc and use a stable cursor so
        Dashboard/Admin can recover recent run history without a second task or
        billing system.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Director run page.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DirectorRunPage' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /director/runs/{id}:
    get:
      tags: [director]
      summary: Get Director run audit trail
      operationId: getDirectorRun
      description: >-
        Returns the org-scoped Director job envelope, ordered step evidence,
        checkpoint snapshots, metering events, and aggregate cost totals from
        NextAPI-owned tables. This endpoint is read-only and does not create
        video tasks, provider calls, or a second billing path.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Director run audit trail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DirectorRunResponse' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /videos:
    post:
      tags: [videos]
      summary: Create video
      operationId: createVideo
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VideoCreateRequest' }
      responses:
        '202':
          description: Accepted.
          headers:
            X-Request-Id: { $ref: '#/components/headers/XRequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/InsufficientQuota' }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '422': { $ref: '#/components/responses/Moderation' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '502': { $ref: '#/components/responses/UpstreamError' }

    get:
      tags: [videos]
      summary: List videos
      operationId: listVideos
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/VideoStatus' }
        - name: model
          in: query
          schema: { type: string }
        - name: created_after
          in: query
          schema: { type: string, format: date-time }
        - name: created_before
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VideoPage' }

  /videos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [videos]
      summary: Get video
      operationId: getVideo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [videos]
      summary: Cancel video
      operationId: cancelVideo
      responses:
        '200':
          description: Cancelled or deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Already running. }

  /videos/{id}/wait:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: timeout
        in: query
        schema: { type: integer, minimum: 1, maximum: 600, default: 60 }
    get:
      tags: [videos]
      summary: Wait for video
      operationId: waitForVideo
      responses:
        '200':
          description: Terminal state reached.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
            text/event-stream:
              schema: { $ref: '#/components/schemas/VideoSseEvent' }
        '408':
          description: Timed out.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }

  /video/generations:
    post:
      tags: [videos]
      summary: Create video (legacy)
      operationId: createVideoLegacy
      deprecated: true
      description: >-
        Legacy endpoint retained for backwards compatibility. Prefer POST /videos.
        Accepts model plus the same fields as VideoInput at the top level.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LegacyVideoCreateRequest' }
      responses:
        '202':
          description: Accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/InsufficientQuota' }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '502': { $ref: '#/components/responses/UpstreamError' }

  /jobs/{id}:
    get:
      tags: [videos]
      summary: Get job (legacy)
      operationId: getJobLegacy
      deprecated: true
      description: Legacy alias for GET /videos/{id}. Prefer /videos/{id}.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404': { $ref: '#/components/responses/NotFound' }

  /credits:
    get:
      tags: [credits]
      summary: Get credits balance
      operationId: getCredits
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Credits' }

  /billing/usage:
    get:
      tags: [usage]
      summary: List usage
      operationId: listUsage
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: days
          in: query
          schema: { type: integer, minimum: 1, maximum: 90, default: 30 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsagePage' }

  /billing/ledger:
    get:
      tags: [credits]
      summary: List ledger entries
      operationId: listLedger
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, has_more]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/LedgerEntry' } }
                  has_more: { type: boolean }

  /billing/settings:
    get:
      tags: [billing]
      summary: Get billing settings
      operationId: getBillingSettings
      security: [ { bearerBusiness: [] } ]
      description: Org billing settings. Requires business key (sk_*).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingSettings' }
    patch:
      tags: [billing]
      summary: Update billing settings
      operationId: updateBillingSettings
      security: [ { bearerBusiness: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BillingSettings' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingSettings' }

  /billing/recharge:
    post:
      tags: [billing]
      summary: Recharge credits
      operationId: rechargeCredits
      security: [ { bearerAuth: [] } ]
      description: Manually top up the org's credit balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents]
              properties:
                amount_cents: { type: integer, minimum: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Credits' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /billing/checkout:
    post:
      tags: [billing]
      summary: Create checkout session
      operationId: createCheckoutSession
      security: [ { bearerAuth: [] } ]
      description: Create a payment provider checkout session for credit purchase.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents]
              properties:
                amount_cents: { type: integer, minimum: 1 }
                success_url: { type: string, format: uri }
                cancel_url: { type: string, format: uri }
      responses:
        '200':
          description: Checkout session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_url: { type: string, format: uri }
                  session_id: { type: string }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [auth]
      summary: Get auth identity
      operationId: getAuthMe
      description: Returns the authenticated org and key metadata. Requires business key (sk_*).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  org_id: { type: string }
                  org_name: { type: string }
                  key_id: { type: string }
                  key_name: { type: string }
                  scopes: { type: array, items: { type: string } }

  /usage.csv:
    get:
      tags: [usage]
      summary: Export usage CSV
      operationId: exportUsageCsv
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: start
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: end
          in: query
          required: true
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: CSV download.
          content:
            text/csv:
              schema: { type: string }

  /ledger.csv:
    get:
      tags: [credits]
      summary: Export ledger CSV
      operationId: exportLedgerCsv
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: CSV download of credits ledger.
          content:
            text/csv:
              schema: { type: string }

  /spend_controls:
    get:
      tags: [spend_controls]
      summary: Get spend controls
      operationId: getSpendControls
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SpendControls' }
    put:
      tags: [spend_controls]
      summary: Update spend controls
      operationId: updateSpendControls
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SpendControlsUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SpendControls' }

  /spend_alerts:
    get:
      tags: [spend_controls]
      summary: List spend alerts
      operationId: listSpendAlerts
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SpendAlertPage' }

  /throughput:
    get:
      tags: [throughput]
      summary: Get throughput config
      operationId: getThroughput
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThroughputConfig' }

  /moderation_profile:
    get:
      tags: [moderation]
      summary: Get moderation profile
      operationId: getModerationProfile
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationProfile' }
    put:
      tags: [moderation]
      summary: Update moderation profile
      operationId: updateModerationProfile
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerationProfile' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationProfile' }

  /keys:
    get:
      tags: [keys]
      summary: List admin API keys
      operationId: listApiKeys
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyPage' }
    post:
      tags: [keys]
      summary: Create admin API key
      operationId: createApiKey
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyCreateRequest' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyWithSecret' }

  /keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [keys]
      summary: Get API key
      operationId: getApiKey
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
    patch:
      tags: [keys]
      summary: Update API key
      operationId: updateApiKey
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyUpdateRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
    delete:
      tags: [keys]
      summary: Revoke API key
      operationId: revokeApiKey
      security: [ { bearerAuth: [] } ]
      responses:
        '204': { description: Revoked. }

  /me/keys:
    get:
      tags: [keys]
      summary: List my API keys
      operationId: listMyKeys
      security: [ { bearerBusiness: [] } ]
      description: List API keys for the authenticated org. Requires business key (sk_*).
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyPage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [keys]
      summary: Create my API key
      operationId: createMyKey
      security: [ { bearerBusiness: [] } ]
      description: Create a new API key for the authenticated org. Requires business key (sk_*).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyCreateRequest' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyWithSecret' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [keys]
      summary: Get my API key
      operationId: getMyKey
      security: [ { bearerBusiness: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [keys]
      summary: Update my API key
      operationId: updateMyKey
      security: [ { bearerBusiness: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyUpdateRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [keys]
      summary: Revoke my API key
      operationId: revokeMyKey
      security: [ { bearerBusiness: [] } ]
      responses:
        '204': { description: Revoked. }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/library/assets:
    get:
      tags: [assets]
      summary: List my reusable media assets
      operationId: listMyLibraryAssets
      security: [ { bearerBusiness: [] } ]
      description: >-
        Lists org-scoped persistent media assets. By default this returns only
        image assets for existing reference-image flows. Use kind=video,
        kind=audio, or kind=all to recover generated media rows such as
        Director final_asset videos. Manual permanent uploads remain image-only.
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [image, video, audio, all]
            default: image
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryAssetListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: R2-backed asset library is not configured.

  /webhooks:
    get:
      tags: [webhooks]
      summary: List webhooks
      operationId: listWebhooks
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookPage' }
    post:
      tags: [webhooks]
      summary: Create webhook
      operationId: createWebhook
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookCreateRequest' }
      responses:
        '201':
          description: Created. `signing_secret` shown ONCE.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookWithSecret' }

  /webhooks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [webhooks]
      summary: Get webhook
      operationId: getWebhook
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Webhook' }
    delete:
      tags: [webhooks]
      summary: Delete webhook
      operationId: deleteWebhook
      security: [ { bearerAuth: [] } ]
      responses:
        '204': { description: Deleted. }

  /webhooks/{id}/rotate:
    post:
      tags: [webhooks]
      summary: Rotate webhook secret
      operationId: rotateWebhookSecret
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: New signing secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookWithSecret' }

  /webhooks/{id}/deliveries:
    get:
      tags: [webhooks]
      summary: List webhook deliveries
      operationId: listWebhookDeliveries
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookDeliveryPage' }

  /me/bootstrap:
    post:
      tags: [bridge]
      summary: Bootstrap business key
      operationId: meBootstrap
      security: []
      description: >-
        Exchange a Clerk JWT for a business API key (sk_live_* / sk_test_*).
        Called by the dashboard SPA on first load. Rate-limited to 30 req/min.
        Pass the Clerk session token as `Authorization: Bearer <clerk_jwt>`.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string, example: 'Bearer <clerk_jwt>' }
          description: Clerk session JWT.
      responses:
        '200':
          description: Business key returned.
          content:
            application/json:
              schema:
                type: object
                required: [secret, prefix, key_id, name, org, balance]
                properties:
                  secret: { type: string, description: "Full sk_live_* key. Shown once." }
                  prefix: { type: string }
                  key_id: { type: string }
                  name: { type: string }
                  org:
                    type: object
                    required: [id, name]
                    properties:
                      id: { type: string }
                      name: { type: string }
                  balance: { type: integer, description: Balance in cents. }
                  note: { type: string }
        '401':
          description: Invalid or missing Clerk JWT (invalid_token / missing_token).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Clerk integration not configured (clerk_not_configured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /internal/admin/session:
    post:
      tags: [bridge]
      summary: Create admin operator session
      operationId: createAdminOperatorSession
      security: []
      description: >-
        Exchange a Clerk JWT for a short-lived `ops_*` operator session.
        Only succeeds for users whose email is listed in ADMIN_EMAILS.
        The shared ADMIN_TOKEN is never returned to browsers.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string, example: 'Bearer <clerk_jwt>' }
          description: Clerk session JWT.
      responses:
        '200':
          description: Operator session issued.
          content:
            application/json:
              schema:
                type: object
                required: [session_token, actor_email, expires_at, idle_ttl_secs]
                properties:
                  session_token: { type: string, example: ops_0123456789abcdef }
                  actor_email: { type: string, format: email }
                  expires_at: { type: string, format: date-time }
                  idle_ttl_secs: { type: integer, example: 7200 }
        '401':
          description: Invalid or missing Clerk JWT (invalid_token / missing_token).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Authenticated user is not in ADMIN_EMAILS.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Clerk integration not configured (clerk_not_configured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [bridge]
      summary: Revoke admin operator session
      operationId: revokeAdminOperatorSession
      security: []
      parameters:
        - name: X-Op-Session
          in: header
          required: true
          schema: { type: string, example: ops_0123456789abcdef }
      responses:
        '200':
          description: Session revoked.

  /internal/admin/otp/send:
    post:
      tags: [bridge]
      summary: Send admin OTP
      operationId: sendAdminOtp
      security: []
      description: >-
        Sends a one-time email code for high-risk admin operations.
        Requires an existing operator session. Returns an OTP id; the
        plaintext code is delivered by email and must be submitted as
        `X-Op-OTP: <otp_id>.<6-digit-code>` on the protected operation.
      parameters:
        - name: X-Op-Session
          in: header
          required: true
          schema: { type: string, example: ops_0123456789abcdef }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, example: credits.adjust }
                target_id: { type: string }
                hint: { type: string }
      responses:
        '200':
          description: OTP id issued and email delivery attempted.
          content:
            application/json:
              schema:
                type: object
                required: [otp_id, expires_at, hint]
                properties:
                  otp_id: { type: string }
                  expires_at: { type: string, format: date-time }
                  hint: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Operator session is missing, expired, or not allowed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: OTP email delivery is not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sales/inquiry:
    post:
      tags: [sales]
      summary: Submit sales inquiry
      operationId: submitSalesInquiry
      security: []
      description: Submit a sales inquiry. Rate-limited to 10 requests per hour per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, company, monthly_volume, target_p95_ms]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                company: { type: string }
                monthly_volume: { type: integer, description: Estimated monthly video seconds. }
                target_p95_ms: { type: integer, description: "Target p95 latency in milliseconds." }
                message: { type: string }
      responses:
        '200':
          description: Inquiry received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: received }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /webhooks/clerk:
    post:
      tags: [webhooks]
      summary: Clerk webhook receiver
      operationId: clerkWebhookReceiver
      security: []
      description: >-
        Inbound Clerk event receiver. Validated via Svix signature headers.
        Not a client-callable endpoint — used by Clerk's webhook delivery system.
      parameters:
        - name: svix-id
          in: header
          required: true
          schema: { type: string }
          description: Svix message ID.
        - name: svix-timestamp
          in: header
          required: true
          schema: { type: string }
          description: Svix message timestamp.
        - name: svix-signature
          in: header
          required: true
          schema: { type: string }
          description: Svix HMAC signature.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Event processed.
        '400':
          description: Invalid Svix signature.

  /webhooks/payments/{provider}:
    post:
      tags: [webhooks]
      summary: Payment webhook receiver
      operationId: paymentWebhookReceiver
      security: []
      description: >-
        Inbound payment provider event receiver (Stripe, Wise, etc.). Each
        provider uses its own signature verification. Not a client-callable endpoint.
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, example: stripe }
          description: Payment provider identifier (e.g. stripe, wise).
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Event processed.
        '400':
          description: Invalid provider signature.

  /internal/admin/overview:
    get:
      tags: [internal]
      summary: Admin overview stats
      operationId: adminOverview
      security: [ { adminToken: [] } ]
      description: Platform-wide statistics for the operator panel.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /internal/admin/users:
    get:
      tags: [internal]
      summary: List users
      operationId: adminListUsers
      security: [ { adminToken: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: q
          in: query
          schema: { type: string }
          description: Search by email or user ID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /internal/admin/orgs:
    get:
      tags: [internal]
      summary: List orgs
      operationId: adminListOrgs
      security: [ { adminToken: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: q
          in: query
          schema: { type: string }
          description: Search by org name or ID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /internal/admin/orgs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      tags: [internal]
      summary: Update org
      operationId: adminUpdateOrg
      security: [ { adminToken: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/orgs/{id}/pause:
    post:
      tags: [internal]
      summary: Pause org
      operationId: adminPauseOrg
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Org paused.
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/orgs/{id}/unpause:
    post:
      tags: [internal]
      summary: Unpause org
      operationId: adminUnpauseOrg
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Org unpaused.
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/orgs/{id}/throughput:
    put:
      tags: [internal]
      summary: Update org throughput
      operationId: adminUpsertOrgThroughput
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ThroughputConfig' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThroughputConfig' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/orgs/{id}/moderation:
    put:
      tags: [internal]
      summary: Update org moderation
      operationId: adminUpsertOrgModeration
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerationProfile' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationProfile' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/jobs:
    get:
      tags: [internal]
      summary: List all jobs
      operationId: adminListJobs
      security: [ { adminToken: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/VideoStatus' }
        - name: org_id
          in: query
