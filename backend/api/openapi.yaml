openapi: 3.1.0
info:
  title: NextAPI Gateway
  version: 1.0.0
  summary: Unified B2B gateway for ByteDance Seedance 2.0 video generation.
  description: |
    Exposes a clean, OpenAI/Replicate/fal-style surface over ByteDance's
    Ark Seedance 2.0 / 2.0-fast / 1.x video models. All Ark-specific
    quirks (prompt-suffix flags, token-based pricing, 24h asset TTL,
    endpoint-id indirection) are hidden inside the gateway.

    Conventions:
      * Bearer auth. Business key (sk_live_* / sk_test_*) for /videos, /models,
        /auth/me, /billing/settings, and /me/*; admin key (ak_live_* / ak_test_*)
        for /keys, /credits, /billing/ledger, /billing/usage, /billing/recharge,
        /billing/checkout, /webhooks, /spend_controls, /usage, and export endpoints.
      * Internal operator panel uses X-Admin-Token header for /v1/internal/admin/*.
      * Idempotency-Key header on POSTs. 24h de-dup window.
      * All timestamps are RFC 3339 UTC unless stated otherwise.
      * Cursor pagination on list endpoints.
      * Outbound webhook signatures use HMAC-SHA256. Headers sent with every event:
          - X-NextAPI-Signature: t=<unix>,sha256=<hex>
          - X-NextAPI-Timestamp: <unix epoch seconds>
          - X-NextAPI-Event: <event type, e.g. video.succeeded>
  contact:
    name: NextAPI Platform
    url: https://docs.nextapi.top
  license:
    name: Proprietary
    url: https://nextapi.top/legal/terms

servers:
  - url: https://api.nextapi.top/v1
    description: Production. For local development use http://localhost:8080/v1.

security:
  - bearerBusiness: []

tags:
  - name: videos
  - name: models
  - name: credits
  - name: billing
  - name: usage
  - name: keys
  - name: webhooks
  - name: spend_controls
  - name: moderation
  - name: throughput
  - name: auth
  - name: health
  - name: bridge
    description: Clerk JWT → API key exchange endpoints used by dashboard SPAs on first load.
  - name: sales
  - name: internal
    description: Operator panel endpoints secured by X-Admin-Token. Not for external use.

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /models:
    get:
      tags: [models]
      summary: List models
      operationId: listModels
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelPage' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /models/{model_id}:
    get:
      tags: [models]
      summary: Get model
      operationId: getModel
      parameters:
        - name: model_id
          in: path
          required: true
          schema: { type: string, example: seedance-2.0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '404': { $ref: '#/components/responses/NotFound' }

  /videos:
    post:
      tags: [videos]
      summary: Create video
      operationId: createVideo
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VideoCreateRequest' }
      responses:
        '202':
          description: Accepted.
          headers:
            X-Request-Id: { $ref: '#/components/headers/XRequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/InsufficientQuota' }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '422': { $ref: '#/components/responses/Moderation' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '502': { $ref: '#/components/responses/UpstreamError' }

    get:
      tags: [videos]
      summary: List videos
      operationId: listVideos
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/VideoStatus' }
        - name: model
          in: query
          schema: { type: string }
        - name: created_after
          in: query
          schema: { type: string, format: date-time }
        - name: created_before
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VideoPage' }

  /videos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [videos]
      summary: Get video
      operationId: getVideo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [videos]
      summary: Cancel video
      operationId: cancelVideo
      responses:
        '200':
          description: Cancelled or deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Already running. }

  /videos/{id}/wait:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: timeout
        in: query
        schema: { type: integer, minimum: 1, maximum: 600, default: 60 }
    get:
      tags: [videos]
      summary: Wait for video
      operationId: waitForVideo
      responses:
        '200':
          description: Terminal state reached.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
            text/event-stream:
              schema: { $ref: '#/components/schemas/VideoSseEvent' }
        '408':
          description: Timed out.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }

  /video/generations:
    post:
      tags: [videos]
      summary: Create video (legacy)
      operationId: createVideoLegacy
      deprecated: true
      description: >-
        Legacy endpoint retained for backwards compatibility. Prefer POST /videos.
        Accepts the same body as VideoCreateRequest and returns a Video object.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VideoCreateRequest' }
      responses:
        '202':
          description: Accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/InsufficientQuota' }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '502': { $ref: '#/components/responses/UpstreamError' }

  /jobs/{id}:
    get:
      tags: [videos]
      summary: Get job (legacy)
      operationId: getJobLegacy
      deprecated: true
      description: Legacy alias for GET /videos/{id}. Prefer /videos/{id}.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404': { $ref: '#/components/responses/NotFound' }

  /credits:
    get:
      tags: [credits]
      summary: Get credits balance
      operationId: getCredits
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Credits' }

  /billing/usage:
    get:
      tags: [usage]
      summary: List usage
      operationId: listUsage
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: days
          in: query
          schema: { type: integer, minimum: 1, maximum: 90, default: 30 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsagePage' }

  /billing/ledger:
    get:
      tags: [credits]
      summary: List ledger entries
      operationId: listLedger
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, has_more]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/LedgerEntry' } }
                  has_more: { type: boolean }

  /billing/settings:
    get:
      tags: [billing]
      summary: Get billing settings
      operationId: getBillingSettings
      security: [ { bearerBusiness: [] } ]
      description: Org billing settings. Requires business key (sk_*).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingSettings' }
    patch:
      tags: [billing]
      summary: Update billing settings
      operationId: updateBillingSettings
      security: [ { bearerBusiness: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BillingSettings' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingSettings' }

  /billing/recharge:
    post:
      tags: [billing]
      summary: Recharge credits
      operationId: rechargeCredits
      security: [ { bearerAuth: [] } ]
      description: Manually top up the org's credit balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents]
              properties:
                amount_cents: { type: integer, minimum: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Credits' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /billing/checkout:
    post:
      tags: [billing]
      summary: Create checkout session
      operationId: createCheckoutSession
      security: [ { bearerAuth: [] } ]
      description: Create a payment provider checkout session for credit purchase.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents]
              properties:
                amount_cents: { type: integer, minimum: 1 }
                success_url: { type: string, format: uri }
                cancel_url: { type: string, format: uri }
      responses:
        '200':
          description: Checkout session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_url: { type: string, format: uri }
                  session_id: { type: string }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [auth]
      summary: Get auth identity
      operationId: getAuthMe
      description: Returns the authenticated org and key metadata. Requires business key (sk_*).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  org_id: { type: string }
                  org_name: { type: string }
                  key_id: { type: string }
                  key_name: { type: string }
                  scopes: { type: array, items: { type: string } }

  /usage.csv:
    get:
      tags: [usage]
      summary: Export usage CSV
      operationId: exportUsageCsv
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: start
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: end
          in: query
          required: true
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: CSV download.
          content:
            text/csv:
              schema: { type: string }

  /ledger.csv:
    get:
      tags: [credits]
      summary: Export ledger CSV
      operationId: exportLedgerCsv
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: CSV download of credits ledger.
          content:
            text/csv:
              schema: { type: string }

  /spend_controls:
    get:
      tags: [spend_controls]
      summary: Get spend controls
      operationId: getSpendControls
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SpendControls' }
    put:
      tags: [spend_controls]
      summary: Update spend controls
      operationId: updateSpendControls
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SpendControlsUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SpendControls' }

  /spend_alerts:
    get:
      tags: [spend_controls]
      summary: List spend alerts
      operationId: listSpendAlerts
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SpendAlertPage' }

  /throughput:
    get:
      tags: [throughput]
      summary: Get throughput config
      operationId: getThroughput
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThroughputConfig' }

  /moderation_profile:
    get:
      tags: [moderation]
      summary: Get moderation profile
      operationId: getModerationProfile
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationProfile' }
    put:
      tags: [moderation]
      summary: Update moderation profile
      operationId: updateModerationProfile
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerationProfile' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationProfile' }

  /keys:
    get:
      tags: [keys]
      summary: List admin API keys
      operationId: listApiKeys
      security: [ { bearerAuth: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyPage' }
    post:
      tags: [keys]
      summary: Create admin API key
      operationId: createApiKey
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyCreateRequest' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyWithSecret' }

  /keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [keys]
      summary: Get API key
      operationId: getApiKey
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
    patch:
      tags: [keys]
      summary: Update API key
      operationId: updateApiKey
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyUpdateRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
    delete:
      tags: [keys]
      summary: Revoke API key
      operationId: revokeApiKey
      security: [ { bearerAuth: [] } ]
      responses:
        '204': { description: Revoked. }

  /me/keys:
    get:
      tags: [keys]
      summary: List my API keys
      operationId: listMyKeys
      security: [ { bearerBusiness: [] } ]
      description: List API keys for the authenticated org. Requires business key (sk_*).
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyPage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [keys]
      summary: Create my API key
      operationId: createMyKey
      security: [ { bearerBusiness: [] } ]
      description: Create a new API key for the authenticated org. Requires business key (sk_*).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyCreateRequest' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyWithSecret' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [keys]
      summary: Get my API key
      operationId: getMyKey
      security: [ { bearerBusiness: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [keys]
      summary: Update my API key
      operationId: updateMyKey
      security: [ { bearerBusiness: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyUpdateRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [keys]
      summary: Revoke my API key
      operationId: revokeMyKey
      security: [ { bearerBusiness: [] } ]
      responses:
        '204': { description: Revoked. }
        '404': { $ref: '#/components/responses/NotFound' }

  /webhooks:
    get:
      tags: [webhooks]
      summary: List webhooks
      operationId: listWebhooks
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookPage' }
    post:
      tags: [webhooks]
      summary: Create webhook
      operationId: createWebhook
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookCreateRequest' }
      responses:
        '201':
          description: Created. `signing_secret` shown ONCE.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookWithSecret' }

  /webhooks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [webhooks]
      summary: Get webhook
      operationId: getWebhook
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Webhook' }
    delete:
      tags: [webhooks]
      summary: Delete webhook
      operationId: deleteWebhook
      security: [ { bearerAuth: [] } ]
      responses:
        '204': { description: Deleted. }

  /webhooks/{id}/rotate:
    post:
      tags: [webhooks]
      summary: Rotate webhook secret
      operationId: rotateWebhookSecret
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: New signing secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookWithSecret' }

  /webhooks/{id}/deliveries:
    get:
      tags: [webhooks]
      summary: List webhook deliveries
      operationId: listWebhookDeliveries
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookDeliveryPage' }

  /me/bootstrap:
    post:
      tags: [bridge]
      summary: Bootstrap business key
      operationId: meBootstrap
      security: []
      description: >-
        Exchange a Clerk JWT for a business API key (sk_live_* / sk_test_*).
        Called by the dashboard SPA on first load. Rate-limited to 30 req/min.
        Pass the Clerk session token as `Authorization: Bearer <clerk_jwt>`.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string, example: 'Bearer <clerk_jwt>' }
          description: Clerk session JWT.
      responses:
        '200':
          description: Business key returned.
          content:
            application/json:
              schema:
                type: object
                required: [secret, prefix, key_id, name, org, balance]
                properties:
                  secret: { type: string, description: "Full sk_live_* key. Shown once." }
                  prefix: { type: string }
                  key_id: { type: string }
                  name: { type: string }
                  org:
                    type: object
                    required: [id, name]
                    properties:
                      id: { type: string }
                      name: { type: string }
                  balance: { type: integer, description: Balance in cents. }
                  note: { type: string }
        '401':
          description: Invalid or missing Clerk JWT (invalid_token / missing_token).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Clerk integration not configured (clerk_not_configured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /me/admin-bootstrap:
    post:
      tags: [bridge]
      summary: Bootstrap admin token
      operationId: meAdminBootstrap
      security: []
      description: >-
        Exchange a Clerk JWT for an admin token. Only succeeds for users whose
        email is listed in ADMIN_EMAILS. Rate-limited to 10 req/min.
        Pass the Clerk session token as `Authorization: Bearer <clerk_jwt>`.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string, example: 'Bearer <clerk_jwt>' }
          description: Clerk session JWT.
      responses:
        '200':
          description: Admin token issued.
          content:
            application/json:
              schema:
                type: object
                required: [admin_token]
                properties:
                  admin_token: { type: string }
                  expires_at:
                    type: [string, 'null']
                    format: date-time
        '401':
          description: Invalid or missing Clerk JWT (invalid_token / missing_token).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Authenticated user is not in ADMIN_EMAILS (not_admin).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Clerk integration not configured (clerk_not_configured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sales/inquiry:
    post:
      tags: [sales]
      summary: Submit sales inquiry
      operationId: submitSalesInquiry
      security: []
      description: Submit a sales inquiry. Rate-limited to 10 requests per hour per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, company, monthly_volume, target_p95_ms]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                company: { type: string }
                monthly_volume: { type: integer, description: Estimated monthly video seconds. }
                target_p95_ms: { type: integer, description: "Target p95 latency in milliseconds." }
                message: { type: string }
      responses:
        '200':
          description: Inquiry received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: received }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /webhooks/clerk:
    post:
      tags: [webhooks]
      summary: Clerk webhook receiver
      operationId: clerkWebhookReceiver
      security: []
      description: >-
        Inbound Clerk event receiver. Validated via Svix signature headers.
        Not a client-callable endpoint — used by Clerk's webhook delivery system.
      parameters:
        - name: svix-id
          in: header
          required: true
          schema: { type: string }
          description: Svix message ID.
        - name: svix-timestamp
          in: header
          required: true
          schema: { type: string }
          description: Svix message timestamp.
        - name: svix-signature
          in: header
          required: true
          schema: { type: string }
          description: Svix HMAC signature.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Event processed.
        '400':
          description: Invalid Svix signature.

  /webhooks/payments/{provider}:
    post:
      tags: [webhooks]
      summary: Payment webhook receiver
      operationId: paymentWebhookReceiver
      security: []
      description: >-
        Inbound payment provider event receiver (Stripe, Wise, etc.). Each
        provider uses its own signature verification. Not a client-callable endpoint.
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, example: stripe }
          description: Payment provider identifier (e.g. stripe, wise).
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Event processed.
        '400':
          description: Invalid provider signature.

  /internal/admin/overview:
    get:
      tags: [internal]
      summary: Admin overview stats
      operationId: adminOverview
      security: [ { adminToken: [] } ]
      description: Platform-wide statistics for the operator panel.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /internal/admin/users:
    get:
      tags: [internal]
      summary: List users
      operationId: adminListUsers
      security: [ { adminToken: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: q
          in: query
          schema: { type: string }
          description: Search by email or user ID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /internal/admin/orgs:
    get:
      tags: [internal]
      summary: List orgs
      operationId: adminListOrgs
      security: [ { adminToken: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: q
          in: query
          schema: { type: string }
          description: Search by org name or ID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /internal/admin/orgs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      tags: [internal]
      summary: Update org
      operationId: adminUpdateOrg
      security: [ { adminToken: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/orgs/{id}/pause:
    post:
      tags: [internal]
      summary: Pause org
      operationId: adminPauseOrg
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Org paused.
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/orgs/{id}/unpause:
    post:
      tags: [internal]
      summary: Unpause org
      operationId: adminUnpauseOrg
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Org unpaused.
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/orgs/{id}/throughput:
    put:
      tags: [internal]
      summary: Update org throughput
      operationId: adminUpsertOrgThroughput
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ThroughputConfig' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThroughputConfig' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/orgs/{id}/moderation:
    put:
      tags: [internal]
      summary: Update org moderation
      operationId: adminUpsertOrgModeration
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerationProfile' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationProfile' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/jobs:
    get:
      tags: [internal]
      summary: List all jobs
      operationId: adminListJobs
      security: [ { adminToken: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/VideoStatus' }
        - name: org_id
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, has_more]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Video' } }
                  has_more: { type: boolean }
                  next_cursor: { type: [string, 'null'] }

  /internal/admin/jobs/{id}/cancel:
    post:
      tags: [internal]
      summary: Cancel job
      operationId: adminCancelJob
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Job cancelled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/credits/adjust:
    post:
      tags: [internal]
      summary: Adjust org credits
      operationId: adminAdjustCredits
      security: [ { adminToken: [] } ]
      description: Manually adjust an org's credit balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, delta_credits]
              properties:
                org_id: { type: string }
                delta_credits: { type: integer, description: "Positive to add, negative to subtract." }
                note: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LedgerEntry' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/moderation/events:
    get:
      tags: [internal]
      summary: List moderation events
      operationId: adminListModerationEvents
      security: [ { adminToken: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: org_id
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /internal/admin/moderation/events/{id}:
    patch:
      tags: [internal]
      summary: Update moderation event
      operationId: adminAddModerationNote
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
                resolved: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/webhooks/deliveries/{id}/replay:
    post:
      tags: [internal]
      summary: Replay webhook delivery
      operationId: adminReplayWebhookDelivery
      security: [ { adminToken: [] } ]
      description: Force-replay a webhook delivery attempt.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '202':
          description: Replay queued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookDelivery' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerBusiness:
      type: http
      scheme: bearer
      bearerFormat: sk_live_xxx
      description: >-
        Business API key for /v1/videos, /v1/models, /v1/auth/me, /v1/me/*.
        Format: `sk_live_<hex>` (production) or `sk_test_<hex>` (test mode).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ak_live_xxx
      description: >-
        Admin API key for /v1/keys/*, /v1/credits, /v1/billing/ledger,
        /v1/billing/usage, /v1/billing/recharge, /v1/billing/checkout,
        /v1/webhooks/*, /v1/spend_controls, /v1/spend_alerts, /v1/throughput,
        /v1/moderation_profile, and export endpoints.
        Format: `ak_live_<hex>` (production) or `ak_test_<hex>` (test mode).
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: >-
        Shared operator token for /v1/internal/admin/* endpoints.
        Not a per-org bearer key — used only by the internal operator panel.

  parameters:
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, maxLength: 128 }
      description: Dedup window 24h.

  headers:
    XRequestId:
      schema: { type: string }
    XRateLimitLimit:
      schema: { type: integer }
    XRateLimitRemaining:
      schema: { type: integer }
    XRateLimitReset:
      schema: { type: integer }

  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InvalidRequest:
      description: Validation error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    IdempotencyConflict:
      description: Same Idempotency-Key with different body.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InsufficientQuota:
      description: >-
        Not enough credits, budget cap hit, org paused, or in-flight liability
        exceeded (balance minus estimated cost of queued/running jobs is below
        the cost of this request). Top up or wait for running jobs to complete.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Moderation:
      description: Content moderation rejected the request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Rate-limited.
      headers:
        X-RateLimit-Limit: { $ref: '#/components/headers/XRateLimitLimit' }
        X-RateLimit-Remaining: { $ref: '#/components/headers/XRateLimitRemaining' }
        X-RateLimit-Reset: { $ref: '#/components/headers/XRateLimitReset' }
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    UpstreamError:
      description: Ark upstream returned an error after retries.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:

    Health:
      type: object
      required: [status, version]
      properties:
        status: { type: string, enum: [ok, degraded] }
        version: { type: string }
        region: { type: string }

    ErrorCode:
      type: string
      description: >-
        Machine-readable error code returned in the `error.code` field.
        This enum lists common platform-level codes; endpoint-specific codes
        follow the pattern `<domain>.<detail>`.
      enum:
        - authentication.missing_bearer
        - authentication.invalid_key
        - authorization.wrong_kind
        - authorization.ip_not_allowed
        - rate_limited
        - idempotency_conflict
        - idempotent_request_in_progress
        - spend_cap_exceeded
        - moderation_blocked
        - provider_unavailable
        - invalid_request.resolution_unsupported
        - invalid_request.model_not_found
        - not_found

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, example: invalid_request.resolution_unsupported }
            message: { type: string }
            request_id: { type: string }
            param: { type: string }
            doc_url: { type: string, format: uri }

    VideoStatus:
      type: string
      enum: [queued, running, succeeded, failed, cancelled]

    AspectRatio:
      type: string
      enum: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9"]

    Resolution:
      type: string
      enum: [480p, 720p, 1080p]

    ReferenceItem:
      type: object
      required: [type, url]
      properties:
        type: { type: string, enum: [image, video, audio] }
        role:
          type: string
          enum: [subject, environment, first_frame, last_frame, reference_video, audio, style]
        url: { type: string, format: uri }

    VideoCreateRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
          enum: [seedance-2.0, seedance-2.0-fast, seedance-1.5-pro, seedance-1.0-pro, seedance-1.0-pro-fast, seedance-1.0-lite]
        prompt: { type: string, maxLength: 4000 }
        negative_prompt: { type: string, maxLength: 1000 }
        aspect_ratio: { $ref: '#/components/schemas/AspectRatio' }
        resolution: { $ref: '#/components/schemas/Resolution' }
        duration_seconds: { type: integer, minimum: -1, maximum: 15 }
        fps: { type: integer, enum: [24, 30], default: 24 }
        seed: { type: integer, minimum: 0, maximum: 4294967295 }
        watermark: { type: boolean, default: false }
        first_frame_url: { type: string, format: uri }
        last_frame_url: { type: string, format: uri }
        reference_video_url: { type: string, format: uri }
        references:
          type: array
          maxItems: 12
          items: { $ref: '#/components/schemas/ReferenceItem' }
        webhook_url: { type: string, format: uri }
        metadata:
          type: object
          additionalProperties: { type: string }

    VideoInputEcho:
      type: object
      properties:
        model: { type: string }
        prompt: { type: string }
        negative_prompt: { type: string }
        aspect_ratio: { $ref: '#/components/schemas/AspectRatio' }
        resolution: { $ref: '#/components/schemas/Resolution' }
        duration_seconds: { type: integer }
        fps: { type: integer }
        seed: { type: integer }
        watermark: { type: boolean }
        references:
          type: array
          items: { $ref: '#/components/schemas/ReferenceItem' }

    VideoOutput:
      type: object
      properties:
        video_url: { type: string, format: uri }
        thumbnail_url: { type: string, format: uri }
        last_frame_url: { type: string, format: uri }
        duration_seconds: { type: number }
        width: { type: integer }
        height: { type: integer }
        fps: { type: integer }
        has_audio: { type: boolean }

    VideoUsage:
      type: object
      properties:
        video_seconds: { type: number }
        upstream_tokens: { type: integer }
        estimated_cost_cents: { type: integer }
        actual_cost_cents: { type: [integer, 'null'] }

    Video:
      type: object
      required: [id, object, status, model, created_at]
      properties:
        id: { type: string, example: vid_01HXXX }
        object: { type: string, const: video }
        status: { $ref: '#/components/schemas/VideoStatus' }
        model: { type: string }
        created_at: { type: string, format: date-time }
        started_at: { type: [string, 'null'], format: date-time }
        finished_at: { type: [string, 'null'], format: date-time }
        input: { $ref: '#/components/schemas/VideoInputEcho' }
        output:
          oneOf:
            - $ref: '#/components/schemas/VideoOutput'
            - type: 'null'
        usage: { $ref: '#/components/schemas/VideoUsage' }
        error:
          oneOf:
            - $ref: '#/components/schemas/Error'
            - type: 'null'
        metadata:
          type: object
          additionalProperties: { type: string }
        _links:
          type: object
          properties:
            self: { type: string, format: uri }
            cancel: { type: string, format: uri }
            wait: { type: string, format: uri }

    VideoPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Video' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    VideoSseEvent:
      type: object
      properties:
        event: { type: string, enum: [queued, running, succeeded, failed, cancelled, heartbeat] }
        data: { $ref: '#/components/schemas/Video' }

    Model:
      type: object
      required: [id, family, max_duration_seconds, supported_resolutions]
      properties:
        id: { type: string }
        family: { type: string }
        description: { type: string }
        modality_support:
          type: object
          properties:
            text_to_video: { type: boolean }
            image_to_video: { type: boolean }
            video_to_video: { type: boolean }
            audio_to_video: { type: boolean }
            multimodal_reference: { type: boolean }
        max_duration_seconds: { type: integer }
        min_duration_seconds: { type: integer, default: 4 }
        supports_auto_duration: { type: boolean }
        supported_resolutions:
          type: array
          items: { $ref: '#/components/schemas/Resolution' }
        supported_aspect_ratios:
          type: array
          items: { $ref: '#/components/schemas/AspectRatio' }
        supports_audio_output: { type: boolean }
        price_cents_per_second:
          type: object
          additionalProperties: { type: integer }
        status: { type: string, enum: [ga, beta, deprecated] }

    ModelPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Model' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    Credits:
      type: object
      required: [balance_cents, currency]
      properties:
        balance_cents: { type: integer }
        currency: { type: string, const: USD }
        auto_reload_enabled: { type: boolean }
        auto_reload_threshold_cents: { type: integer }
        auto_reload_amount_cents: { type: integer }
        lifetime_spend_cents: { type: integer }
        current_period_spend_cents: { type: integer }
        period_resets_on: { type: integer, minimum: 1, maximum: 28 }

    UsageLineItem:
      type: object
      properties:
        bucket: { type: string }
        model: { type: string }
        api_key_id: { type: string }
        video_seconds: { type: number }
        request_count: { type: integer }
        success_count: { type: integer }
        failure_count: { type: integer }
        cost_cents: { type: integer }

    UsagePage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/UsageLineItem' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    SpendControls:
      type: object
      properties:
        hard_cap_cents: { type: [integer, 'null'] }
        soft_alert_cents: { type: [integer, 'null'] }
        auto_pause_below_cents: { type: [integer, 'null'] }
        monthly_limit_cents: { type: [integer, 'null'] }
        period_resets_on: { type: integer, minimum: 1, maximum: 28 }
        paused_at: { type: [string, 'null'], format: date-time }
        pause_reason: { type: [string, 'null'] }
        current_burn_rate_cents_per_day: { type: integer }

    SpendControlsUpdate:
      type: object
      properties:
        hard_cap_cents: { type: [integer, 'null'] }
        soft_alert_cents: { type: [integer, 'null'] }
        auto_pause_below_cents: { type: [integer, 'null'] }
        monthly_limit_cents: { type: [integer, 'null'] }
        period_resets_on: { type: integer, minimum: 1, maximum: 28 }

    SpendAlert:
      type: object
      properties:
        id: { type: integer, format: int64 }
        kind: { type: string, enum: [soft_alert, auto_paused, monthly_limit_hit] }
        amount_cents: { type: integer }
        period_start: { type: string, format: date-time }
        fired_at: { type: string, format: date-time }

    SpendAlertPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/SpendAlert' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    ThroughputConfig:
      type: object
      properties:
        reserved_concurrency: { type: integer, description: "Guaranteed concurrent jobs for this org." }
        burst_concurrency: { type: integer, description: "Soft ceiling above reserved." }
        priority_lane: { type: string, enum: [standard, priority, dedicated] }
        queue_tier:
          type: string
          enum: [default, critical]
          description: >-
            Worker queue assignment. 'critical' gets 8x priority weight.
            Overridden by per-key provisioned_concurrency >= 50.
        rpm_limit: { type: integer, description: "Requests per minute cap (sliding)." }
        current_in_flight: { type: integer }

    ModerationProfile:
      type: object
      properties:
        profile: { type: string, enum: [strict, balanced, relaxed, custom] }
        custom_rules:
          type: object
          description: Only meaningful when profile=custom.
          properties:
            allow_nsfw: { type: boolean }
            allow_minors: { type: boolean }
            allow_public_figures: { type: boolean }
            block_keywords: { type: array, items: { type: string } }

    ApiKeyScope:
      type: string
      enum: [videos.read, videos.write, models.read]

    ApiKeyCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 80 }
        scopes:
          type: array
          items: { $ref: '#/components/schemas/ApiKeyScope' }
          default: [videos.read, videos.write, models.read]
        allowed_models:
          type: array
          items: { type: string }
        monthly_spend_cap_cents: { type: integer, minimum: 0 }
        rate_limit_rpm: { type: integer, minimum: 1 }
        ip_allowlist:
          type: array
          items: { type: string }
        moderation_profile:
          type: string
          enum: [strict, balanced, relaxed, custom]
        provisioned_concurrency:
          type: integer
          minimum: 1
          default: 5
          description: >-
            Maximum concurrent jobs for this key. Keys with >= 50 are routed
            to the critical priority queue.

    ApiKeyUpdateRequest:
      type: object
      properties:
        name: { type: string }
        disabled: { type: boolean }
        allowed_models: { type: array, items: { type: string } }
        monthly_spend_cap_cents: { type: integer }
        rate_limit_rpm: { type: integer }
        ip_allowlist: { type: array, items: { type: string } }
        moderation_profile: { type: string, enum: [strict, balanced, relaxed, custom] }

    ApiKey:
      type: object
      required: [id, name, prefix, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        prefix: { type: string }
        scopes: { type: array, items: { $ref: '#/components/schemas/ApiKeyScope' } }
        allowed_models: { type: array, items: { type: string } }
        disabled: { type: boolean }
        monthly_spend_cap_cents: { type: [integer, 'null'] }
        rate_limit_rpm: { type: [integer, 'null'] }
        ip_allowlist: { type: array, items: { type: string } }
        moderation_profile: { type: [string, 'null'] }
        provisioned_concurrency: { type: integer, default: 5 }
        created_at: { type: string, format: date-time }
        last_used_at: { type: [string, 'null'], format: date-time }

    ApiKeyWithSecret:
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          required: [secret]
          properties:
            secret: { type: string }

    ApiKeyPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ApiKey' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    WebhookEventType:
      type: string
      enum: [video.queued, video.started, video.succeeded, video.failed, video.cancelled, video.*, budget.alert, budget.auto_paused, budget.monthly_limit]

    WebhookCreateRequest:
      type: object
      required: [url, events]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/WebhookEventType' }
        description: { type: string }

    Webhook:
      type: object
      required: [id, url, events, created_at]
      properties:
        id: { type: string }
        url: { type: string, format: uri }
        events: { type: array, items: { $ref: '#/components/schemas/WebhookEventType' } }
        description: { type: string }
        disabled: { type: boolean }
        last_delivery_at: { type: [string, 'null'], format: date-time }
        last_delivery_status: { type: [integer, 'null'] }
        created_at: { type: string, format: date-time }

    WebhookWithSecret:
      allOf:
        - $ref: '#/components/schemas/Webhook'
        - type: object
          required: [signing_secret]
          properties:
            signing_secret: { type: string }

    WebhookPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Webhook' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    WebhookDelivery:
      type: object
      properties:
        id: { type: string }
        webhook_id: { type: string }
        event_type: { $ref: '#/components/schemas/WebhookEventType' }
        status_code: { type: [integer, 'null'] }
        error: { type: [string, 'null'] }
        attempt: { type: integer }
        next_retry_at: { type: [string, 'null'], format: date-time }
        delivered_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }

    WebhookDeliveryPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/WebhookDelivery' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    BillingSettings:
      type: object
      properties:
        company_name: { type: [string, 'null'] }
        tax_id: { type: [string, 'null'] }
        billing_email: { type: [string, 'null'], format: email }
        country_region: { type: [string, 'null'] }

    LedgerEntry:
      type: object
      properties:
        id: { type: integer, format: int64 }
        org_id: { type: string }
        delta_credits: { type: integer }
        delta_cents: { type: [integer, 'null'] }
        reason: { type: string, enum: [signup_bonus, topup, consumption, reservation, reconciliation, refund, adjustment] }
        job_id: { type: [string, 'null'] }
        note: { type: string }
        created_at: { type: string, format: date-time }

    WebhookEventEnvelope:
      type: object
      required: [id, type, created_at, data]
      properties:
        id: { type: string }
        type: { $ref: '#/components/schemas/WebhookEventType' }
        created_at: { type: string, format: date-time }
        api_version: { type: string, const: "1.0" }
        data:
          type: object
          properties:
            video_id:
              type: string
              format: uuid
              description: The video ID (UUID).
            job_id:
              type: string
              format: uuid
              description: >-
                Legacy alias for video_id. Retained for backwards compatibility
                with older SDKs. Always equal to video_id.
            video: { $ref: '#/components/schemas/Video' }

webhooks:
  videoEvent:
    post:
      summary: Outbound video event
      description: >-
        Outbound video.* event delivered to your registered webhook URL.
        Signed with HMAC-SHA256; verify using X-NextAPI-Signature.
      parameters:
        - name: X-NextAPI-Signature
          in: header
          required: true
          schema: { type: string, example: 't=1700000000,sha256=abcdef0123456789' }
          description: "HMAC-SHA256 signature. Format: t=<unix>,sha256=<hex>."
        - name: X-NextAPI-Timestamp
          in: header
          required: true
          schema: { type: string, example: '1700000000' }
          description: Unix epoch seconds when the event was dispatched.
        - name: X-NextAPI-Event
          in: header
          required: true
          schema: { type: string, example: 'video.succeeded' }
          description: Event type matching WebhookEventType.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEventEnvelope' }
      responses:
        '2XX':
          description: Any 2xx accepted. Non-2xx triggers retry per backoff schedule.
