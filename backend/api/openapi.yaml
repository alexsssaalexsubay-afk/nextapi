                  data: { type: array, items: { $ref: '#/components/schemas/Video' } }
                  has_more: { type: boolean }
                  next_cursor: { type: [string, 'null'] }

  /internal/admin/jobs/{id}/cancel:
    post:
      tags: [internal]
      summary: Cancel job
      operationId: adminCancelJob
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Job cancelled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/credits/adjust:
    post:
      tags: [internal]
      summary: Adjust org credits
      operationId: adminAdjustCredits
      security: [ { adminToken: [] } ]
      description: Manually adjust an org's credit balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, delta_credits]
              properties:
                org_id: { type: string }
                delta_credits: { type: integer, description: "Positive to add, negative to subtract." }
                note: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LedgerEntry' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/moderation/events:
    get:
      tags: [internal]
      summary: List moderation events
      operationId: adminListModerationEvents
      security: [ { adminToken: [] } ]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: org_id
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /internal/admin/moderation/events/{id}:
    patch:
      tags: [internal]
      summary: Update moderation event
      operationId: adminAddModerationNote
      security: [ { adminToken: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
                resolved: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/webhooks/deliveries/{id}/replay:
    post:
      tags: [internal]
      summary: Replay webhook delivery
      operationId: adminReplayWebhookDelivery
      security: [ { adminToken: [] } ]
      description: Force-replay a webhook delivery attempt.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '202':
          description: Replay queued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookDelivery' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/admin/marketing/slots:
    get:
      tags: [internal]
      summary: List marketing site slots (operator)
      operationId: adminListMarketingSlots
      security: [ { adminToken: [] } ]
      description: >-
        Browser admin uses `X-Op-Session` with the same paths; OpenAPI lists
        `X-Admin-Token` as the shared internal security scheme for codegen.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketingSlotsAdminResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Database unavailable.

  /internal/admin/marketing/slots/{slot}:
    parameters:
      - name: slot
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-z][a-z0-9_]{1,48}$'
        description: Slot identifier (e.g. landing_hero_main, gallery_strip_1).
    put:
      tags: [internal]
      summary: Set marketing slot from HTTPS URLs
      operationId: adminPutMarketingSlotExternal
      security: [ { adminToken: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MarketingSlotPutBody' }
      responses:
        '200':
          description: Saved.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, const: true }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [internal]
      summary: Delete marketing slot (and best-effort R2 delete)
      operationId: adminDeleteMarketingSlot
      security: [ { adminToken: [] } ]
      responses:
        '204':
          description: Removed or was already absent.
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /internal/admin/marketing/slots/{slot}/upload:
    parameters:
      - name: slot
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-z][a-z0-9_]{1,48}$'
    post:
      tags: [internal]
      summary: Upload marketing slot media to R2
      operationId: adminUploadMarketingSlot
      security: [ { adminToken: [] } ]
      description: >-
        Multipart body: `media_kind` (image|video), `file` (main asset). For video,
        optional `poster` image. Objects are stored under `marketing/site-slots/`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [media_kind, file]
              properties:
                media_kind:
                  type: string
                  enum: [image, video]
                file:
                  type: string
                  format: binary
                  description: Main image or video bytes.
                poster:
                  type: string
                  format: binary
                  description: Optional JPEG/PNG/WebP poster when media_kind is video.
      responses:
        '201':
          description: Uploaded and slot saved.
          content:
            application/json:
              schema:
                type: object
                required: [ok, storage_key]
                properties:
                  ok: { type: boolean, const: true }
                  storage_key: { type: string }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: R2 not configured or upload failed.

components:
  securitySchemes:
    bearerBusiness:
      type: http
      scheme: bearer
      bearerFormat: sk_live_xxx
      description: >-
        Business API key for /v1/videos, /v1/models, /v1/auth/me, /v1/me/*, /v1/webhooks.
        Format: `sk_live_<hex>` (production) or `sk_test_<hex>` (test mode).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ak_live_xxx
      description: >-
        Admin API key for /v1/keys/*, /v1/credits, /v1/billing/ledger,
        /v1/billing/usage, /v1/billing/recharge, /v1/billing/checkout,
        /v1/spend_controls, /v1/spend_alerts, /v1/throughput,
        /v1/moderation_profile, and export endpoints.
        Format: `ak_live_<hex>` (production) or `ak_test_<hex>` (test mode).
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: >-
        Shared operator token for scripts, cron jobs, and emergency ops.
        Browser admin calls should use X-Op-Session instead.

  parameters:
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, maxLength: 128 }
      description: Dedup window 24h.

  headers:
    XRequestId:
      schema: { type: string }
    XRateLimitLimit:
      schema: { type: integer }
    XRateLimitRemaining:
      schema: { type: integer }
    XRateLimitReset:
      schema: { type: integer }

  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InvalidRequest:
      description: Validation error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    IdempotencyConflict:
      description: Same Idempotency-Key with different body.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InsufficientQuota:
      description: >-
        Not enough credits, budget cap hit, org paused, or in-flight liability
        exceeded (balance minus estimated cost of queued/running jobs is below
        the cost of this request). Top up or wait for running jobs to complete.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Moderation:
      description: Content moderation rejected the request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Rate-limited.
      headers:
        X-RateLimit-Limit: { $ref: '#/components/headers/XRateLimitLimit' }
        X-RateLimit-Remaining: { $ref: '#/components/headers/XRateLimitRemaining' }
        X-RateLimit-Reset: { $ref: '#/components/headers/XRateLimitReset' }
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    UpstreamError:
      description: The generation provider returned an error after retries.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:

    Health:
      type: object
      required: [status, version]
      properties:
        status: { type: string, enum: [ok, degraded] }
        version: { type: string }
        region: { type: string }

    MarketingSlotPublic:
      type: object
      required: [slot_key, media_kind, url, updated_at]
      properties:
        slot_key: { type: string }
        media_kind: { type: string, enum: [image, video] }
        url: { type: string, description: HTTPS URL or presigned GET URL. }
        poster_url: { type: string, description: Optional poster/preview URL. }
        updated_at: { type: string, format: date-time }

    MarketingSlotsPublicResponse:
      type: object
      required: [slots]
      properties:
        slots:
          type: array
          items: { $ref: '#/components/schemas/MarketingSlotPublic' }

    MarketingSlotAdminRow:
      type: object
      required: [slot_key, media_kind, url, source, updated_at]
      properties:
        slot_key: { type: string }
        media_kind: { type: string, enum: [image, video] }
        url:
          type: string
          description: >-
            Resolved URL, or empty when `source` is `r2_non_cms` (R2 key outside
            the marketing CMS prefix — fix or delete the row).
        poster_url: { type: string }
        source:
          type: string
          enum: [external, r2, r2_non_cms]
        updated_at: { type: string, format: date-time }

    MarketingSlotsAdminResponse:
      type: object
      required: [slots]
      properties:
        slots:
          type: array
          items: { $ref: '#/components/schemas/MarketingSlotAdminRow' }

    MarketingSlotPutBody:
      type: object
      required: [media_kind, url]
      properties:
        media_kind: { type: string, enum: [image, video] }
        url: { type: string, format: uri, description: Public HTTPS URL for the main asset. }
        poster_url: { type: string, format: uri, description: Optional HTTPS poster for video. }
        clear_poster: { type: boolean, default: false }

    ErrorCode:
      type: string
      description: >-
        Machine-readable error code returned in the `error.code` field.
        This enum lists common platform-level codes; endpoint-specific codes
        follow the pattern `<domain>.<detail>`.
      enum:
        - authentication.missing_bearer
        - authentication.invalid_key
        - authorization.wrong_kind
        - authorization.ip_not_allowed
        - rate_limited
        - idempotency_conflict
        - idempotent_request_in_progress
        - spend_cap_exceeded
        - moderation_blocked
        - provider_unavailable
        - invalid_request.resolution_unsupported
        - invalid_request.model_not_found
        - not_found

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, example: invalid_request.resolution_unsupported }
            message: { type: string }
            request_id: { type: string }
            param: { type: string }
            doc_url: { type: string, format: uri }

    VideoStatus:
      type: string
      enum: [queued, submitting, running, retrying, succeeded, failed, cancelled]

    AspectRatio:
      type: string
      enum: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"]

    Resolution:
      type: string
      enum: [480p, 720p, 1080p]

    ReferenceItem:
      type: object
      required: [type, url]
      properties:
        type: { type: string, enum: [image, video, audio] }
        role:
          type: string
          enum: [subject, environment, first_frame, last_frame, reference_video, audio, style]
        url: { type: string, format: uri }

    VideoContentMediaURL:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Public HTTPS URL or approved asset://ut-asset-* URL.

    VideoContentPart:
      type: object
      required: [type]
      description: >
        UpToken-compatible content[] part. Shared generation params such as
        duration_seconds, resolution, ratio/aspect_ratio, generate_audio,
        draft, and seed remain top-level input fields.
      properties:
        type: { type: string, enum: [text, image_url, video_url, audio_url] }
        text:
          type: string
          description: Text prompt part. Multiple text parts are joined in order.
        role:
          type: string
          enum: [reference_image, first_frame, last_frame, reference_video, reference_audio]
          description: Required for explicit media roles; omitted image/video/audio roles default to their reference role.
        image_url: { $ref: '#/components/schemas/VideoContentMediaURL' }
        video_url: { $ref: '#/components/schemas/VideoContentMediaURL' }
        audio_url: { $ref: '#/components/schemas/VideoContentMediaURL' }

    VideoCreateRequest:
      type: object
      required: [model, input]
      description: >
        Customer-facing body for POST /v1/videos. `input` carries generation
        parameters (see VideoInput). Top-level `model`, `webhook_url`, and
        `idempotency_key` are gateway-level fields.
      properties:
        model:
          type: string
          description: >
            Public NextAPI model ID. Primary catalogue: `seedance-2.0-pro`,
            `seedance-2.0-fast`. Legacy IDs (`seedance-2.0`,
            `seedance-1.x-*`) remain accepted for backward compatibility
            and resolve to the same tiers.
          example: seedance-2.0-pro
        input: { $ref: '#/components/schemas/VideoInput' }
        webhook_url: { type: string, format: uri }
        idempotency_key: { type: string, maxLength: 255 }

    LegacyVideoCreateRequest:
      allOf:
        - $ref: '#/components/schemas/VideoInput'
        - type: object
          required: [model]
          properties:
            model:
              type: string
              description: Public NextAPI model ID.
              example: seedance-2.0-pro

    VideoInput:
      type: object
      description: >
        Video generation input. `prompt` is optional when visual media is
        provided (`image_url`, `image_urls`, `video_urls`, `first_frame_url`,
        or `last_frame_url`). The gateway intentionally does not impose a
        local character-only prompt cap; current upstream Seedance/UpToken
        guidance is language-aware (EN <=1000 words, ZH <=500 chars), and
        upstream `error.message` is the source of truth for prompt rejection.
      properties:
        prompt:
          type: string
          description: "Text prompt. Optional when visual media input exists; no local 2000/4000-character hard cap."
        image_url: { type: string, format: uri, description: "Optional source image for image-to-video." }
        duration_seconds: { type: integer, minimum: 4, maximum: 15 }
        resolution: { $ref: '#/components/schemas/Resolution' }
        mode: { type: string, enum: [fast, normal], default: normal }
        aspect_ratio: { $ref: '#/components/schemas/AspectRatio' }
        ratio:
          allOf:
            - $ref: '#/components/schemas/AspectRatio'
          description: "Alias for aspect_ratio. If both are provided, they must match."
        fps: { type: integer, enum: [24, 30] }
        generate_audio: { type: boolean, description: "When true, request an audio track with the video (model-dependent)." }
        watermark: { type: boolean }
        seed: { type: integer, description: "Use -1 or omit for random; otherwise [0, 2^32-1]." }
        camera_fixed: { type: boolean, description: "Lock the camera to reduce motion." }
        draft: { type: boolean, description: "Fast preview mode with lower quality and cost." }
        image_urls:
          type: array
          maxItems: 9
          items: { type: string, format: uri }
          description: "Reference images (mutually exclusive with first_frame_url)."
        video_urls:
          type: array
          maxItems: 3
          items: { type: string, format: uri }
          description: "Reference videos."
        audio_urls:
          type: array
          maxItems: 3
          items: { type: string, format: uri }
          description: "Reference audio clips (requires image or video input)."
        first_frame_url: { type: string, format: uri, description: "First frame image (mutually exclusive with image_urls)." }
        last_frame_url: { type: string, format: uri, description: "Last frame image (requires first_frame_url)." }
        content:
          type: array
          items: { $ref: '#/components/schemas/VideoContentPart' }
          description: >
            UpToken-compatible content[] alternative for prompt/media inputs.
            Mutually exclusive with prompt, image_url, image_urls, video_urls,
            audio_urls, first_frame_url, and last_frame_url.
        references:
          type: array
          maxItems: 12
          items: { $ref: '#/components/schemas/ReferenceItem' }

    VideoInputEcho:
      type: object
      description: Server echoes the resolved input back so clients can confirm what was applied.
      properties:
        model: { type: string }
        prompt: { type: string }
        image_url: { type: string, format: uri }
        aspect_ratio: { $ref: '#/components/schemas/AspectRatio' }
        ratio: { $ref: '#/components/schemas/AspectRatio' }
        resolution: { $ref: '#/components/schemas/Resolution' }
        duration_seconds: { type: integer }
        fps: { type: integer }
        mode: { type: string, enum: [fast, normal] }
        generate_audio: { type: boolean }
        watermark: { type: boolean }
        seed: { type: integer }
        camera_fixed: { type: boolean }
        draft: { type: boolean }
        image_urls:
          type: array
          items: { type: string, format: uri }
        video_urls:
          type: array
          items: { type: string, format: uri }
        audio_urls:
          type: array
          items: { type: string, format: uri }
        first_frame_url: { type: string, format: uri }
        last_frame_url: { type: string, format: uri }
        content:
          type: array
          items: { $ref: '#/components/schemas/VideoContentPart' }
        references:
          type: array
          items: { $ref: '#/components/schemas/ReferenceItem' }

    VideoOutput:
      type: object
      properties:
        video_url: { type: string, format: uri }
        thumbnail_url: { type: string, format: uri }
        last_frame_url: { type: string, format: uri }
        duration_seconds: { type: number }
        width: { type: integer }
        height: { type: integer }
        fps: { type: integer }
        has_audio: { type: boolean }

    VideoUsage:
      type: object
      description: Optional; GET may also expose top-level cost fields.
      properties:
        video_seconds: { type: number }
        provider_tokens: { type: integer, description: "Token count reported for the job (when available)." }
        estimated_cost_cents: { type: integer }
        actual_cost_cents: { type: [integer, 'null'] }

    Video:
      type: object
      description: >
        202 response includes at least id, object, model, status, estimated_cost_cents, created_at.
        GET /videos/{id} adds input, output, error_code, and error_message as applicable.
      required: [id, object, status, model, created_at]
      properties:
        id: { type: string, example: vid_01HXXX }
        object: { type: string, const: video }
        status: { $ref: '#/components/schemas/VideoStatus' }
        model:
          type: string
          description: "Public model id, e.g. seedance-2.0-pro, seedance-2.0-fast."
        created_at: { type: string, format: date-time }
        started_at: { type: [string, 'null'], format: date-time }
        finished_at: { type: [string, 'null'], format: date-time }
        input: { $ref: '#/components/schemas/VideoInputEcho' }
        output:
          oneOf:
            - $ref: '#/components/schemas/VideoOutput'
            - type: 'null'
        estimated_cost_cents: { type: integer, description: "Reserved cost in USD whole cents." }
        actual_cost_cents: { type: [integer, 'null'] }
        error_code: { type: [string, 'null'] }
        error_message: { type: [string, 'null'] }
        usage: { $ref: '#/components/schemas/VideoUsage' }
        error:
          oneOf:
            - $ref: '#/components/schemas/Error'
            - type: 'null'
        metadata:
          type: object
          additionalProperties: { type: string }
        _links:
          type: object
          properties:
            self: { type: string, format: uri }
            cancel: { type: string, format: uri }
            wait: { type: string, format: uri }

    VideoPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Video' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    VideoSseEvent:
      type: object
      properties:
        event: { type: string, enum: [queued, running, succeeded, failed, cancelled, heartbeat] }
        data: { $ref: '#/components/schemas/Video' }

    DirectorJob:
      type: object
      required: [id, org_id, story, status, engine_used, fallback_used, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        workflow_id: { type: [string, 'null'], format: uuid }
        workflow_run_id: { type: [string, 'null'], format: uuid }
        batch_run_id: { type: [string, 'null'], format: uuid }
        title: { type: string }
        story: { type: string }
        status: { type: string }
        engine_used: { type: string }
        fallback_used: { type: boolean }
        selected_character_ids:
          type: array
          items: { type: string }
        budget_snapshot:
          type: object
          additionalProperties: true
        plan_snapshot:
          type: object
          additionalProperties: true
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DirectorStep:
      type: object
      required: [id, director_job_id, org_id, step_key, status, attempts, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        director_job_id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        step_key: { type: string }
        status: { type: string }
        provider_id: { type: [string, 'null'], format: uuid }
        job_id: { type: [string, 'null'], format: uuid }
        input_snapshot:
          type: object
          additionalProperties: true
        output_snapshot:
          type: object
          additionalProperties: true
        error_code: { type: string }
        attempts: { type: integer }
        started_at: { type: [string, 'null'], format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DirectorMetering:
      type: object
      required: [id, org_id, meter_type, units, estimated_cents, actual_cents, credits_delta, status, created_at]
      properties:
        id: { type: integer, format: int64 }
        org_id: { type: string, format: uuid }
        director_job_id: { type: [string, 'null'], format: uuid }
        step_id: { type: [string, 'null'], format: uuid }
        job_id: { type: [string, 'null'], format: uuid }
        provider_id: { type: [string, 'null'], format: uuid }
        meter_type: { type: string }
        units: { type: number }
        estimated_cents: { type: integer, format: int64 }
        actual_cents: { type: integer, format: int64 }
        credits_delta: { type: integer, format: int64 }
        status: { type: string }
        usage_json:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }

    DirectorCheckpoint:
      type: object
      required: [id, director_job_id, org_id, checkpoint_key, state_snapshot, created_at]
      properties:
        id: { type: string, format: uuid }
        director_job_id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        checkpoint_key: { type: string }
        state_snapshot:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }

    DirectorRunTotals:
      type: object
      required: [metering_events, estimated_cents, actual_cents, credits_delta]
      properties:
        metering_events: { type: integer }
        estimated_cents: { type: integer, format: int64 }
        actual_cents: { type: integer, format: int64 }
        credits_delta: { type: integer, format: int64 }

    DirectorRunFinalAsset:
      type: object
      required: [available, step_status]
      properties:
        available: { type: boolean }
        step_status: { type: string }
        error_code: { type: string }
        asset_id: { type: string }
        video_url: { type: string }
        storage_key: { type: string }
        merged_at: { type: string }

    DirectorRunSummary:
      type: object
      required: [director_job, step_count, totals]
      properties:
        director_job: { $ref: '#/components/schemas/DirectorJob' }
        step_count: { type: integer, format: int64 }
        totals: { $ref: '#/components/schemas/DirectorRunTotals' }
        latest_checkpoint: { $ref: '#/components/schemas/DirectorCheckpoint' }
        final_asset: { $ref: '#/components/schemas/DirectorRunFinalAsset' }

    DirectorRunPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/DirectorRunSummary' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    DirectorRunResponse:
      type: object
      required: [director_job, steps, metering, checkpoints, totals]
      properties:
        director_job: { $ref: '#/components/schemas/DirectorJob' }
        steps:
          type: array
          items: { $ref: '#/components/schemas/DirectorStep' }
        metering:
          type: array
          items: { $ref: '#/components/schemas/DirectorMetering' }
        checkpoints:
          type: array
          items: { $ref: '#/components/schemas/DirectorCheckpoint' }
        totals: { $ref: '#/components/schemas/DirectorRunTotals' }
        final_asset: { $ref: '#/components/schemas/DirectorRunFinalAsset' }

    LibraryAsset:
      type: object
      required: [id, kind, filename, content_type, size_bytes, url, generation_url, url_expires_at, created_at]
      properties:
        id: { type: string, format: uuid }
        kind:
          type: string
          enum: [image, video, audio]
        filename: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer, format: int64 }
        url: { type: string, format: uri }
        generation_url: { type: string, format: uri }
        url_expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        seedance_asset_id: { type: string }
        seedance_asset_url: { type: string, format: uri }
        seedance_asset_status: { type: string }

    LibraryAssetListResponse:
      type: object
      required: [assets, ttl_seconds]
      properties:
        assets:
          type: array
          items: { $ref: '#/components/schemas/LibraryAsset' }
        ttl_seconds: { type: integer }

    Model:
      type: object
      required: [id, family, max_duration_seconds, supported_resolutions]
      properties:
        id: { type: string }
        family: { type: string }
        description: { type: string }
        modality_support:
          type: object
          properties:
            text_to_video: { type: boolean }
            image_to_video: { type: boolean }
            video_to_video: { type: boolean }
            audio_to_video: { type: boolean }
            multimodal_reference: { type: boolean }
        max_duration_seconds: { type: integer }
        min_duration_seconds: { type: integer, default: 4 }
        supports_auto_duration: { type: boolean }
        supported_resolutions:
          type: array
          items: { $ref: '#/components/schemas/Resolution' }
        supported_aspect_ratios:
          type: array
          items: { $ref: '#/components/schemas/AspectRatio' }
        supports_audio_output: { type: boolean }
        price_cents_per_second:
          type: object
          additionalProperties: { type: integer }
        status: { type: string, enum: [ga, beta, deprecated] }

    ModelPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Model' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    Credits:
      type: object
      required: [balance_cents, currency]
      properties:
        balance_cents: { type: integer }
        currency: { type: string, const: USD }
        auto_reload_enabled: { type: boolean }
        auto_reload_threshold_cents: { type: integer }
        auto_reload_amount_cents: { type: integer }
        lifetime_spend_cents: { type: integer }
        current_period_spend_cents: { type: integer }
        period_resets_on: { type: integer, minimum: 1, maximum: 28 }

    UsageLineItem:
      type: object
      properties:
        bucket: { type: string }
        model: { type: string }
        api_key_id: { type: string }
        video_seconds: { type: number }
        request_count: { type: integer }
        success_count: { type: integer }
        failure_count: { type: integer }
        cost_cents: { type: integer }

    UsagePage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/UsageLineItem' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    SpendControls:
      type: object
      properties:
        hard_cap_cents: { type: [integer, 'null'] }
        soft_alert_cents: { type: [integer, 'null'] }
        auto_pause_below_cents: { type: [integer, 'null'] }
        monthly_limit_cents: { type: [integer, 'null'] }
        period_resets_on: { type: integer, minimum: 1, maximum: 28 }
        paused_at: { type: [string, 'null'], format: date-time }
        pause_reason: { type: [string, 'null'] }
        current_burn_rate_cents_per_day: { type: integer }

    SpendControlsUpdate:
      type: object
      properties:
        hard_cap_cents: { type: [integer, 'null'] }
        soft_alert_cents: { type: [integer, 'null'] }
        auto_pause_below_cents: { type: [integer, 'null'] }
        monthly_limit_cents: { type: [integer, 'null'] }
        period_resets_on: { type: integer, minimum: 1, maximum: 28 }

    SpendAlert:
      type: object
      properties:
        id: { type: integer, format: int64 }
        kind: { type: string, enum: [soft_alert, auto_paused, monthly_limit_hit] }
        amount_cents: { type: integer }
        period_start: { type: string, format: date-time }
        fired_at: { type: string, format: date-time }

    SpendAlertPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/SpendAlert' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    ThroughputConfig:
      type: object
      properties:
        reserved_concurrency: { type: integer, description: "Guaranteed concurrent jobs for this org." }
        burst_concurrency: { type: integer, description: "Soft ceiling above reserved." }
        priority_lane: { type: string, enum: [standard, priority, dedicated] }
        queue_tier:
          type: string
          enum: [default, critical]
          description: >-
            Worker queue assignment. 'critical' gets 8x priority weight.
            Overridden by per-key provisioned_concurrency >= 50.
        rpm_limit: { type: integer, description: "Requests per minute cap (sliding)." }
        current_in_flight: { type: integer }

    ModerationProfile:
      type: object
      properties:
        profile: { type: string, enum: [strict, balanced, relaxed, custom] }
        custom_rules:
          type: object
          description: Only meaningful when profile=custom.
          properties:
            allow_nsfw: { type: boolean }
            allow_minors: { type: boolean }
            allow_public_figures: { type: boolean }
            block_keywords: { type: array, items: { type: string } }

    ApiKeyScope:
      type: string
      enum: [videos.read, videos.write, models.read]

    ApiKeyCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 80 }
        scopes:
          type: array
          items: { $ref: '#/components/schemas/ApiKeyScope' }
          default: [videos.read, videos.write, models.read]
        allowed_models:
          type: array
          items: { type: string }
        monthly_spend_cap_cents: { type: integer, minimum: 0 }
        rate_limit_rpm: { type: integer, minimum: 1 }
        ip_allowlist:
          type: array
          items: { type: string }
        moderation_profile:
          type: string
          enum: [strict, balanced, relaxed, custom]
        provisioned_concurrency:
          type: integer
          minimum: 1
          default: 5
          description: >-
            Maximum concurrent jobs for this key. Keys with >= 50 are routed
            to the critical priority queue.

    ApiKeyUpdateRequest:
      type: object
      properties:
        name: { type: string }
        disabled: { type: boolean }
        allowed_models: { type: array, items: { type: string } }
        monthly_spend_cap_cents: { type: integer }
        rate_limit_rpm: { type: integer }
        ip_allowlist: { type: array, items: { type: string } }
        moderation_profile: { type: string, enum: [strict, balanced, relaxed, custom] }

    ApiKey:
      type: object
      required: [id, name, prefix, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        prefix: { type: string }
        scopes: { type: array, items: { $ref: '#/components/schemas/ApiKeyScope' } }
        allowed_models: { type: array, items: { type: string } }
        disabled: { type: boolean }
        monthly_spend_cap_cents: { type: [integer, 'null'] }
        rate_limit_rpm: { type: [integer, 'null'] }
        ip_allowlist: { type: array, items: { type: string } }
        moderation_profile: { type: [string, 'null'] }
        provisioned_concurrency: { type: integer, default: 5 }
        created_at: { type: string, format: date-time }
        last_used_at: { type: [string, 'null'], format: date-time }

    ApiKeyWithSecret:
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          required: [secret]
          properties:
            secret: { type: string }

    ApiKeyPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ApiKey' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    WebhookEventType:
      type: string
      enum: [video.queued, video.started, video.succeeded, video.failed, video.cancelled, video.*, budget.alert, budget.auto_paused, budget.monthly_limit]

    WebhookCreateRequest:
      type: object
      required: [url, events]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/WebhookEventType' }
        description: { type: string }

    Webhook:
      type: object
      required: [id, url, events, created_at]
      properties:
        id: { type: string }
        url: { type: string, format: uri }
        events: { type: array, items: { $ref: '#/components/schemas/WebhookEventType' } }
        description: { type: string }
        disabled: { type: boolean }
        last_delivery_at: { type: [string, 'null'], format: date-time }
        last_delivery_status: { type: [integer, 'null'] }
        created_at: { type: string, format: date-time }

    WebhookWithSecret:
      allOf:
        - $ref: '#/components/schemas/Webhook'
        - type: object
          required: [signing_secret]
          properties:
            signing_secret: { type: string }

    WebhookPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Webhook' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    WebhookDelivery:
      type: object
      properties:
        id: { type: string }
        webhook_id: { type: string }
        event_type: { $ref: '#/components/schemas/WebhookEventType' }
        status_code: { type: [integer, 'null'] }
        error: { type: [string, 'null'] }
        attempt: { type: integer }
        next_retry_at: { type: [string, 'null'], format: date-time }
        delivered_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }

    WebhookDeliveryPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/WebhookDelivery' }
        has_more: { type: boolean }
        next_cursor: { type: [string, 'null'] }

    BillingSettings:
      type: object
      properties:
        company_name: { type: [string, 'null'] }
        tax_id: { type: [string, 'null'] }
        billing_email: { type: [string, 'null'], format: email }
        country_region: { type: [string, 'null'] }

    LedgerEntry:
      type: object
      properties:
        id: { type: integer, format: int64 }
        org_id: { type: string }
        delta_credits: { type: integer }
        delta_cents: { type: [integer, 'null'] }
        reason: { type: string, enum: [signup_bonus, topup, consumption, reservation, reconciliation, refund, adjustment] }
        job_id: { type: [string, 'null'] }
        note: { type: string }
        created_at: { type: string, format: date-time }

    WebhookEventEnvelope:
      type: object
      required: [id, type, created_at, data]
      properties:
        id: { type: string }
        type: { $ref: '#/components/schemas/WebhookEventType' }
        created_at: { type: string, format: date-time }
        api_version: { type: string, const: "1.0" }
        data:
          type: object
          properties:
            video_id:
              type: string
              format: uuid
              description: The video ID (UUID).
            job_id:
              type: string
              format: uuid
              description: >-
                Legacy alias for video_id. Retained for backwards compatibility
                with older SDKs. Always equal to video_id.
            video: { $ref: '#/components/schemas/Video' }

webhooks:
  videoEvent:
    post:
      summary: Outbound video event
      description: >-
        Outbound video.* event delivered to your registered webhook URL.
        Signed with HMAC-SHA256; verify using X-NextAPI-Signature.
      parameters:
        - name: X-NextAPI-Signature
          in: header
          required: true
          schema: { type: string, example: 't=1700000000,sha256=abcdef0123456789' }
          description: "HMAC-SHA256 signature. Format: t=<unix>,sha256=<hex>."
        - name: X-NextAPI-Timestamp
          in: header
          required: true
          schema: { type: string, example: '1700000000' }
          description: Unix epoch seconds when the event was dispatched.
        - name: X-NextAPI-Event
          in: header
          required: true
          schema: { type: string, example: 'video.succeeded' }
          description: Event type matching WebhookEventType.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEventEnvelope' }
      responses:
        '2XX':
          description: Any 2xx accepted. Non-2xx triggers retry per backoff schedule.
