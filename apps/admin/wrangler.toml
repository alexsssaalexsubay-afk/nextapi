"$schema" = "../../node_modules/wrangler/config-schema.json"
name = "nextapi-admin"
main = ".open-next/worker.js"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "admin.nextapi.top", custom_domain = true },
]

# See ../dashboard/wrangler.toml for env conventions. The publishable key
# below is the TEST Clerk instance; swap to `pk_live_*` for production.
# All sensitive values (CLERK_SECRET_KEY, ADMIN_TOKEN if ever proxied)
# go through `npx wrangler secret put` — never into [vars].
[vars]
NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_YmlnLXZ1bHR1cmUtNi5jbGVyay5hY2NvdW50cy5kZXYk"
NEXT_PUBLIC_API_URL = "https://api.nextapi.top"
NEXT_PUBLIC_CLERK_ENV = "test"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
