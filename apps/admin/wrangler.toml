"$schema" = "../../node_modules/wrangler/config-schema.json"
name = "nextapi-admin"
main = ".open-next/worker.js"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]
keep_names = false

routes = [
  { pattern = "admin.nextapi.top", custom_domain = true },
]

# Admin auth uses NextAPI first-party operator sessions. There are no Clerk
# publishable-key requirements for this worker.

[vars]
NEXT_PUBLIC_API_URL = "https://api.nextapi.top"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
