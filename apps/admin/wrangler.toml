"$schema" = "../../node_modules/wrangler/config-schema.json"
name = "nextapi-admin"
main = ".open-next/worker.js"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]
keep_names = false

routes = [
  { pattern = "admin.nextapi.top", custom_domain = true },
]

# See ../dashboard/wrangler.toml for the rationale. Same rule applies:
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not committed — set in CI/Cloudflare
# build environment (and wrangler/secret as you use for deploy). See
# ../../scripts/check-clerk-env.mjs

[vars]
NEXT_PUBLIC_API_URL = "https://api.nextapi.top"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
