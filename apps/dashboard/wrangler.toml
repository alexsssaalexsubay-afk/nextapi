"$schema" = "../../node_modules/wrangler/config-schema.json"
name = "nextapi-dashboard"
main = ".open-next/worker.js"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]
# OpenNext bundles with esbuild keep_names; next-themes injects a stringified
# script that calls __name(), which is undefined in the browser → console error.
# https://opennext.js.org/cloudflare/howtos/keep_names
keep_names = false

routes = [
  { pattern = "app.nextapi.top", custom_domain = true },
]

# IMPORTANT — secrets policy:
#
#   * NEXT_PUBLIC_API_URL stays inline because it's literally a URL
#     and switching it shouldn't require a secret rotation.
#
#   * Dashboard auth now uses NextAPI first-party account sessions. There
#     are no Clerk publishable-key requirements for this worker.

[vars]
NEXT_PUBLIC_API_URL = "https://api.nextapi.top"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
