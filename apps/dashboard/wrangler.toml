"$schema" = "../../node_modules/wrangler/config-schema.json"
name = "nextapi-dashboard"
main = ".open-next/worker.js"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "app.nextapi.top", custom_domain = true },
]

# IMPORTANT — secrets policy:
#
#   * NEXT_PUBLIC_API_URL stays inline because it's literally a URL
#     and switching it shouldn't require a secret rotation.
#
#   * NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is intentionally NOT in this
#     file. Even though Clerk publishable keys are technically safe to
#     expose, hard-coding the **test** key in source previously caused
#     a real bug: production deploys silently used the test Clerk
#     instance, so real users got created in a sandbox tenant. Set it
#     per-environment with:
#         pnpm --filter @nextapi/dashboard exec wrangler secret put \
#             NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
#     and the deploy step will pick it up. The build asserts its
#     presence (see scripts/check-clerk-env.mjs).
#
#   * CLERK_SECRET_KEY is server-only and MUST go through wrangler
#     secret put as before.

[vars]
NEXT_PUBLIC_API_URL = "https://api.nextapi.top"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
